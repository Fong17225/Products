<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Website affiliate sản phẩm responsive, có search, filter, sort, dark mode và copy link." />
  <title>Affiliate Store</title>
  <style>
    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #ef4444;
      --primary-2: #fb7185;
      --primary-dark: #dc2626;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
      --chip: #f3f4f6;
      --success: #10b981;
    }

    html[data-theme="dark"] {
      --bg: #0f172a;
      --surface: #111827;
      --surface-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #334155;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      --chip: #1e293b;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, rgba(239,68,68,0.08), transparent 34%), var(--bg);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }

    .container { width: min(1200px, calc(100% - 24px)); margin: 0 auto; }

    .header {
      position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex; gap: 12px; align-items: center; justify-content: space-between;
      padding: 14px 0;
    }
    .brand {
      display: flex; align-items: center; gap: 10px; min-width: 180px;
      font-weight: 800; font-size: 1.1rem;
    }
    .brand-badge {
      width: 40px; height: 40px; border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      display: grid; place-items: center; color: white; box-shadow: var(--shadow);
    }
    .brand small { display:block; font-weight:600; color: var(--muted); font-size: 0.78rem; margin-top: 2px; }

    .searchbar {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }
    .input-wrap {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 16px;
      padding: 0 14px;
      min-height: 50px;
    }
    .input-wrap input {
      width: 100%; border: 0; outline: none; background: transparent; color: var(--text);
    }
    .input-wrap input::placeholder { color: var(--muted); }

    .control, .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 16px;
      min-height: 50px;
      padding: 0 14px;
      box-shadow: var(--shadow);
    }
    .control { cursor: pointer; }
    .btn {
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      font-weight: 700;
    }
    .btn:hover, .control:hover { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      border-color: transparent;
    }
    .btn-ghost { background: var(--surface); }
    .icon-btn { width: 50px; display:grid; place-items:center; padding:0; }


    .filters {
      padding: 18px 0 8px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }
    .chips {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .chip {
      border: 1px solid var(--border);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: .18s ease;
      font-weight: 600;
    }
    .chip.active, .chip:hover { background: var(--primary); color: white; border-color: transparent; }

    .meta-row {
      display:flex; align-items:center; justify-content: space-between; gap: 12px;
      padding: 8px 0 16px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      padding-bottom: 28px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s ease, box-shadow .2s ease;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 18px 40px rgba(0,0,0,.14); }
    .thumb {
      position: relative;
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, rgba(239,68,68,.12), rgba(251,113,133,.05));
      overflow: hidden;
    }
    .thumb img {
      width: 100%; height: 100%; object-fit: cover; display:block;
      transition: transform .3s ease, filter .3s ease;
    }
    .card:hover .thumb img { transform: scale(1.05); }
    .tag {
      position: absolute; top: 12px; left: 12px;
      background: rgba(17,24,39,.85); color: white; backdrop-filter: blur(10px);
      border-radius: 999px; padding: 7px 10px; font-size: .75rem; font-weight: 700;
    }
    .content { padding: 14px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
    .name { font-weight: 700; line-height: 1.35; min-height: 2.7em; }
    .price-row { display:flex; align-items:center; justify-content: space-between; gap: 10px; }
    .price { color: var(--primary-dark); font-size: 1.15rem; font-weight: 800; }
    html[data-theme="dark"] .price { color: #fb7185; }
    .btn-row { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: auto; }
    .buy {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white; border: 0; font-weight: 800;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 16px;
    }
    .small-note { color: var(--muted); font-size: .88rem; }

    .skeleton-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow:hidden;
    }
    .sk-img, .sk-line, .sk-btn {
      background: linear-gradient(90deg, color-mix(in srgb, var(--border) 30%, transparent), color-mix(in srgb, var(--border) 62%, transparent), color-mix(in srgb, var(--border) 30%, transparent));
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite linear;
    }
    .sk-img { aspect-ratio: 1/1; }
    .sk-body { padding: 14px; display:grid; gap: 12px; }
    .sk-line { height: 14px; border-radius: 10px; }
    .sk-line.sm { width: 56%; }
    .sk-btn { height: 44px; border-radius: 14px; }

    .empty {
      padding: 50px 16px; text-align: center; background: var(--surface); border: 1px dashed var(--border); border-radius: 22px;
      color: var(--muted);
    }

    .pagination {
      display:flex; gap: 10px; justify-content:center; align-items:center; padding: 8px 0 30px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed; right: 16px; bottom: 16px; z-index: 80;
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      box-shadow: var(--shadow); border-radius: 16px; padding: 14px 16px; transform: translateY(20px); opacity: 0; pointer-events: none;
      transition: .25s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 1080px) {
      .grid, .skeleton-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .hero-card { grid-template-columns: 1fr; }
    }
    @media (max-width: 820px) {
      .header-inner, .filters { grid-template-columns: 1fr; display: grid; }
      .searchbar { grid-template-columns: 1fr 1fr; }
      .brand { min-width: auto; }
      .grid, .skeleton-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .container { width: min(100% - 16px, 1200px); }
      .searchbar { grid-template-columns: 1fr; }
      .grid, .skeleton-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .filters { gap: 12px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="brand" aria-label="Affiliate Store">
        <div class="brand-badge">A</div>
        <div>
          Fashion Store
          <small></small>
        </div>
      </div>

      <div class="searchbar" role="search">
        <div class="input-wrap">
          <span>🔎</span>
          <input id="searchInput" type="search" placeholder="Tìm sản phẩm theo tên..." aria-label="Tìm sản phẩm" />
        </div>
        <button class="control" id="sortToggle" type="button" title="Sắp xếp giá">Giá: Mặc định</button>
        <button class="btn icon-btn" id="themeToggle" type="button" title="Chuyển dark mode">🌙</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="meta-row" style="padding-top: 22px;">
      <!-- <div>
        <strong style="font-size: 1.15rem;">Website affiliate hiện đại, tối ưu cho GitHub Pages</strong>
        <div class="small-note">Tìm kiếm real-time, lọc danh mục, sắp xếp giá, copy link sản phẩm, lazy load ảnh, skeleton loading và dark mode.</div>
      </div> -->
      <div class="small-note">Tổng <strong id="countAll">0</strong> sản phẩm · Đang hiển thị <strong id="countVisible">0</strong></div>
    </section>

    <section class="filters" aria-label="Bộ lọc sản phẩm">
      <div class="chips" id="categoryChips"></div>
      <button class="control" id="resetBtn" type="button">Reset bộ lọc</button>
      <button class="btn btn-primary" id="loadMoreBtn" type="button">Load more</button>
    </section>

    <div class="meta-row">
      <div id="resultInfo">Đang tải dữ liệu...</div>
      <div class="small-note">Mở link affiliate trong tab mới</div>
    </div>

    <section id="skeletonArea" class="skeleton-grid" aria-hidden="true"></section>
    <section id="productGrid" class="grid" aria-live="polite"></section>
    <div id="emptyState" class="empty" hidden>
      <h3>Không tìm thấy sản phẩm</h3>
      <p>Hãy thử từ khóa khác hoặc bỏ bớt bộ lọc.</p>
    </div>

    <nav class="pagination" id="pagination"></nav>
  </main>

  <script>
    const PRODUCTS = [
      { id: 1, name: 'Áo thun basic', price: 179000, image: 'https://picsum.photos/seed/ao1/600/600', link: 'https://example.com/affiliate-1', category: 'Áo' },
      { id: 2, name: 'Áo sơ mi oversize', price: 259000, image: 'https://picsum.photos/seed/ao2/600/600', link: 'https://example.com/affiliate-2', category: 'Áo' },
      { id: 3, name: 'Quần jean ống rộng', price: 329000, image: 'https://picsum.photos/seed/quan1/600/600', link: 'https://example.com/affiliate-3', category: 'Quần' },
      { id: 4, name: 'Quần short kaki', price: 219000, image: 'https://picsum.photos/seed/quan2/600/600', link: 'https://example.com/affiliate-4', category: 'Quần' },
      { id: 5, name: 'Váy hoa nữ', price: 289000, image: 'https://picsum.photos/seed/vay1/600/600', link: 'https://example.com/affiliate-5', category: 'Váy' },
      { id: 6, name: 'Váy chữ A công sở', price: 359000, image: 'https://picsum.photos/seed/vay2/600/600', link: 'https://example.com/affiliate-6', category: 'Váy' },
      { id: 7, name: 'Túi xách mini', price: 249000, image: 'https://picsum.photos/seed/phukien1/600/600', link: 'https://example.com/affiliate-7', category: 'Phụ kiện' },
      { id: 8, name: 'Kính mát thời trang', price: 199000, image: 'https://picsum.photos/seed/phukien2/600/600', link: 'https://example.com/affiliate-8', category: 'Phụ kiện' },
      { id: 9, name: 'Áo hoodie unisex', price: 399000, image: 'https://picsum.photos/seed/ao3/600/600', link: 'https://example.com/affiliate-9', category: 'Áo' },
      { id: 10, name: 'Quần legging co giãn', price: 229000, image: 'https://picsum.photos/seed/quan3/600/600', link: 'https://example.com/affiliate-10', category: 'Quần' },
      { id: 11, name: 'Váy midi thanh lịch', price: 419000, image: 'https://picsum.photos/seed/vay3/600/600', link: 'https://example.com/affiliate-11', category: 'Váy' },
      { id: 12, name: 'Thắt lưng da', price: 159000, image: 'https://picsum.photos/seed/phukien3/600/600', link: 'https://example.com/affiliate-12', category: 'Phụ kiện' }
    ];

    const state = {
      search: '',
      category: 'All',
      sort: 'default',
      page: 1,
      perPage: 8,
      theme: localStorage.getItem('theme') || 'light'
    };

    const els = {
      searchInput: document.getElementById('searchInput'),
      sortToggle: document.getElementById('sortToggle'),
      themeToggle: document.getElementById('themeToggle'),
      categoryChips: document.getElementById('categoryChips'),
      resetBtn: document.getElementById('resetBtn'),
      loadMoreBtn: document.getElementById('loadMoreBtn'),
      productGrid: document.getElementById('productGrid'),
      skeletonArea: document.getElementById('skeletonArea'),
      emptyState: document.getElementById('emptyState'),
      pagination: document.getElementById('pagination'),
      resultInfo: document.getElementById('resultInfo'),
      countAll: document.getElementById('countAll'),
      countVisible: document.getElementById('countVisible'),

    };

    const money = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' });

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      state.theme = theme;
      localStorage.setItem('theme', theme);
      els.themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    }


    function uniqueCategories() {
      return ['All', 'Áo', 'Quần', 'Váy', 'Phụ kiện'];
    }

    function renderChips() {
      els.categoryChips.innerHTML = uniqueCategories().map(cat => `
        <button class="chip ${state.category === cat ? 'active' : ''}" data-category="${cat}">${cat}</button>
      `).join('');
    }

    function renderSkeleton() {
      els.skeletonArea.innerHTML = Array.from({ length: 8 }).map(() => `
        <article class="skeleton">
          <div class="sk-img"></div>
          <div class="sk-body">
            <div class="sk-line"></div>
            <div class="sk-line sm"></div>
            <div class="sk-btn"></div>
          </div>
        </article>
      `).join('');
    }

    function getFilteredProducts() {
      let items = PRODUCTS.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(state.search.toLowerCase().trim());
        const matchCategory = state.category === 'All' || p.category === state.category;
        return matchSearch && matchCategory;
      });

      if (state.sort === 'asc') items.sort((a, b) => a.price - b.price);
      if (state.sort === 'desc') items.sort((a, b) => b.price - a.price);
      return items;
    }

    function paginate(items) {
      const start = 0;
      const end = state.page * state.perPage;
      return items.slice(start, end);
    }

    function cardTemplate(p) {
      return `
        <article class="card">
          <a href="${p.link}" target="_blank" rel="noopener noreferrer" aria-label="Mở ${p.name}">
            <div class="thumb">
              <img src="${p.image}" alt="${p.name}" loading="lazy" />
              <div class="tag">${p.category}</div>
            </div>
          </a>
          <div class="content">
            <div class="name">${p.name}</div>
            <div class="price-row">
              <div class="price">${money.format(p.price)}</div>
            </div>
            <div class="btn-row">
              <a class="btn buy" href="${p.link}" target="_blank" rel="noopener noreferrer">Mua ngay</a>
            </div>
          </div>
        </article>
      `;
    }

    function renderPagination(filteredCount) {
      const totalPages = Math.max(1, Math.ceil(filteredCount / state.perPage));
      const current = Math.min(state.page, totalPages);
      if (filteredCount <= state.perPage) {
        els.pagination.innerHTML = '';
        return;
      }
      els.pagination.innerHTML = `
        <button class="control" ${current <= 1 ? 'disabled' : ''} id="prevPage">Trang trước</button>
        <span class="small-note">Trang ${current} / ${totalPages}</span>
        <button class="control" ${current >= totalPages ? 'disabled' : ''} id="nextPage">Trang sau</button>
      `;
      document.getElementById('prevPage')?.addEventListener('click', () => { state.page--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
      document.getElementById('nextPage')?.addEventListener('click', () => { state.page++; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
    }

    function render() {
      const filtered = getFilteredProducts();
      const visible = paginate(filtered);
      els.countAll.textContent = PRODUCTS.length;
      els.countVisible.textContent = filtered.length;
      els.resultInfo.textContent = `Hiển thị ${visible.length}/${filtered.length} sản phẩm phù hợp`;
      els.sortToggle.textContent = state.sort === 'default' ? 'Giá: Mặc định' : state.sort === 'asc' ? 'Giá: Tăng dần' : 'Giá: Giảm dần';
      renderChips();
      els.productGrid.innerHTML = visible.map(cardTemplate).join('');
      els.emptyState.hidden = filtered.length !== 0;
      els.loadMoreBtn.style.display = filtered.length > visible.length ? 'inline-flex' : 'none';
      els.loadMoreBtn.textContent = `Load more (${Math.min(filtered.length, state.page * state.perPage)}/${filtered.length})`;
      renderPagination(filtered.length);
    }

    function initialize() {
      setTheme(state.theme);
      renderSkeleton();
      setTimeout(() => {
        els.skeletonArea.innerHTML = '';
        render();
      }, 700);
    }

    els.searchInput.addEventListener('input', (e) => {
      state.search = e.target.value;
      state.page = 1;
      render();
    });

    els.sortToggle.addEventListener('click', () => {
      state.sort = state.sort === 'default' ? 'asc' : state.sort === 'asc' ? 'desc' : 'default';
      state.page = 1;
      render();
    });

    els.themeToggle.addEventListener('click', () => {
      setTheme(state.theme === 'dark' ? 'light' : 'dark');
    });

    els.categoryChips.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-category]');
      if (!btn) return;
      state.category = btn.dataset.category;
      state.page = 1;
      render();
    });

    els.resetBtn.addEventListener('click', () => {
      state.search = '';
      state.category = 'All';
      state.sort = 'default';
      state.page = 1;
      els.searchInput.value = '';
      render();
    });

    els.loadMoreBtn.addEventListener('click', () => {
      state.page += 1;
      render();
    });

    initialize();
  </script>
</body>
</html>
